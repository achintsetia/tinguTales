<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- Open Book -->
  <g transform="translate(10, 15)">
    <!-- Left page -->
    <path d="M45 85 C45 35, 45 25, 10 15 L10 75 C45 85, 45 85, 45 85Z" fill="#3730A3" opacity="0.15"/>
    <path d="M45 85 C45 35, 45 25, 10 15" stroke="#3730A3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right page -->
    <path d="M45 85 C45 35, 45 25, 80 15 L80 75 C45 85, 45 85, 45 85Z" fill="#FF9F1C" opacity="0.15"/>
    <path d="M45 85 C45 35, 45 25, 80 15" stroke="#FF9F1C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Spine -->
    <line x1="45" y1="20" x2="45" y2="85" stroke="#1E1B4B" stroke-width="2" stroke-linecap="round"/>
    <!-- Stars popping out -->
    <g fill="#FF9F1C">
      <polygon points="30,8 31.5,13 36,13 32.5,16 33.5,21 30,18 26.5,21 27.5,16 24,13 28.5,13" transform="scale(0.5) translate(30, -10)"/>
      <polygon points="30,8 31.5,13 36,13 32.5,16 33.5,21 30,18 26.5,21 27.5,16 24,13 28.5,13" transform="scale(0.4) translate(130, 0)"/>
    </g>
    <g fill="#2A9D8F">
      <polygon points="30,8 31.5,13 36,13 32.5,16 33.5,21 30,18 26.5,21 27.5,16 24,13 28.5,13" transform="scale(0.35) translate(100, -20)"/>
    </g>
    <!-- Sparkle dots -->
    <circle cx="25" cy="5" r="1.5" fill="#FF9F1C" opacity="0.8"/>
    <circle cx="65" cy="3" r="1" fill="#2A9D8F" opacity="0.7"/>
    <circle cx="55" cy="10" r="1.2" fill="#3730A3" opacity="0.6"/>
    <circle cx="15" cy="10" r="0.8" fill="#E76F51" opacity="0.8"/>
  </g>

  <!-- Wordmark: Tingu Tales -->
  <text x="105" y="68" font-family="'Fredoka', 'Nunito', sans-serif" font-weight="600" font-size="48" letter-spacing="-1">
    <tspan fill="#1E1B4B">Tingu</tspan>
    <tspan fill="#FF9F1C" dx="6">Tales</tspan>
  </text>

  <!-- Tagline -->
  <text x="107" y="90" font-family="'Nunito', sans-serif" font-weight="500" font-size="13" fill="#1E1B4B" opacity="0.45" letter-spacing="3">
    STORIES IN YOUR MOTHER TONGUE
  </text>
</svg>
