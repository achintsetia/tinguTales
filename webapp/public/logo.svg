<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" fill="none">
  <defs>
    <linearGradient id="bookLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="bookRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="100%" stop-color="#FF9F1C"/>
    </linearGradient>
    <linearGradient id="spineLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Book icon group, vertically centred in 120px height -->
  <g transform="translate(8, 10)">
    <!-- Left page fill -->
    <path d="M46 92 C46 36, 44 22, 6 10 L6 72 Z" fill="url(#bookLeft)" opacity="0.18"/>
    <!-- Left page edge -->
    <path d="M46 92 C46 36, 44 22, 6 10" stroke="url(#bookLeft)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left page lines -->
    <line x1="18" y1="28" x2="40" y2="36" stroke="#3730A3" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    <line x1="14" y1="40" x2="40" y2="47" stroke="#3730A3" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    <line x1="12" y1="52" x2="40" y2="58" stroke="#3730A3" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

    <!-- Right page fill -->
    <path d="M46 92 C46 36, 44 22, 86 10 L86 72 Z" fill="url(#bookRight)" opacity="0.18"/>
    <!-- Right page edge -->
    <path d="M46 92 C46 36, 44 22, 86 10" stroke="url(#bookRight)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right page lines -->
    <line x1="52" y1="36" x2="74" y2="28" stroke="#FF9F1C" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    <line x1="52" y1="47" x2="78" y2="40" stroke="#FF9F1C" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
    <line x1="52" y1="58" x2="80" y2="52" stroke="#FF9F1C" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

    <!-- Spine -->
    <line x1="46" y1="14" x2="46" y2="92" stroke="url(#spineLine)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Bottom curve / page curl -->
    <path d="M6 72 Q46 100 86 72" stroke="#1E1B4B" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>

    <!-- Magic stars floating above book -->
    <!-- Large star (orange) -->
    <g transform="translate(20, -2)" filter="url(#glow)">
      <path d="M8 0 L9.8 5.5 L15.5 5.5 L11 8.9 L12.8 14.5 L8 11.1 L3.2 14.5 L5 8.9 L0.5 5.5 L6.2 5.5 Z" fill="#FF9F1C"/>
    </g>
    <!-- Small star (teal) -->
    <g transform="translate(60, 2)" filter="url(#glow)">
      <path d="M5.5 0 L6.7 3.8 L10.7 3.8 L7.5 6.1 L8.7 9.9 L5.5 7.6 L2.3 9.9 L3.5 6.1 L0.3 3.8 L4.3 3.8 Z" fill="#2A9D8F"/>
    </g>
    <!-- Tiny star (indigo) -->
    <g transform="translate(44, -6)" filter="url(#glow)">
      <path d="M4 0 L4.9 2.8 L7.8 2.8 L5.5 4.5 L6.3 7.3 L4 5.6 L1.7 7.3 L2.5 4.5 L0.2 2.8 L3.1 2.8 Z" fill="#4F46E5"/>
    </g>

    <!-- Sparkle dots -->
    <circle cx="10" cy="5" r="2" fill="#FF9F1C" opacity="0.7"/>
    <circle cx="82" cy="4" r="1.5" fill="#2A9D8F" opacity="0.65"/>
    <circle cx="70" cy="-2" r="1" fill="#4F46E5" opacity="0.7"/>
    <circle cx="30" cy="-8" r="1.2" fill="#E76F51" opacity="0.6"/>
    <!-- 4-point sparkle near top -->
    <path d="M76 8 L77 10 L79 11 L77 12 L76 14 L75 12 L73 11 L75 10 Z" fill="#FF9F1C" opacity="0.85"/>
    <path d="M12 14 L13 16 L15 17 L13 18 L12 20 L11 18 L9 17 L11 16 Z" fill="#2A9D8F" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="108" y="64" font-family="'Fredoka', 'Nunito', sans-serif" font-weight="700" font-size="52" letter-spacing="-0.5">
    <tspan fill="#1E1B4B">Tingu</tspan><tspan fill="#FF9F1C" dx="8">Tales</tspan>
  </text>

  <!-- Tagline -->
  <text x="110" y="88" font-family="'Nunito', sans-serif" font-weight="600" font-size="12" fill="#3730A3" opacity="0.5" letter-spacing="3.5">
    STORIES IN YOUR MOTHER TONGUE
  </text>
</svg>
