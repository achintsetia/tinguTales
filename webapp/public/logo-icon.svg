<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Background circle -->
  <circle cx="48" cy="48" r="46" fill="#FDFBF7" stroke="#F3E8FF" stroke-width="2"/>

  <!-- Open Book -->
  <g transform="translate(14, 18)">
    <!-- Left page -->
    <path d="M34 58 C34 24, 34 16, 6 8 L6 50 C34 58, 34 58, 34 58Z" fill="#3730A3" opacity="0.12"/>
    <path d="M34 58 C34 24, 34 16, 6 8" stroke="#3730A3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right page -->
    <path d="M34 58 C34 24, 34 16, 62 8 L62 50 C34 58, 34 58, 34 58Z" fill="#FF9F1C" opacity="0.12"/>
    <path d="M34 58 C34 24, 34 16, 62 8" stroke="#FF9F1C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Spine -->
    <line x1="34" y1="12" x2="34" y2="58" stroke="#1E1B4B" stroke-width="2" stroke-linecap="round"/>

    <!-- Stars -->
    <g fill="#FF9F1C">
      <polygon points="20,0 21.5,4 26,4 22.5,6.5 23.5,10.5 20,8 16.5,10.5 17.5,6.5 14,4 18.5,4" transform="scale(0.6) translate(15, -12)"/>
      <polygon points="20,0 21.5,4 26,4 22.5,6.5 23.5,10.5 20,8 16.5,10.5 17.5,6.5 14,4 18.5,4" transform="scale(0.5) translate(85, -5)"/>
    </g>
    <g fill="#2A9D8F">
      <polygon points="20,0 21.5,4 26,4 22.5,6.5 23.5,10.5 20,8 16.5,10.5 17.5,6.5 14,4 18.5,4" transform="scale(0.45) translate(55, -18)"/>
    </g>

    <!-- Sparkle dots -->
    <circle cx="18" cy="2" r="2" fill="#FF9F1C" opacity="0.8"/>
    <circle cx="50" cy="0" r="1.5" fill="#2A9D8F" opacity="0.7"/>
    <circle cx="42" cy="5" r="1.3" fill="#3730A3" opacity="0.6"/>
  </g>

  <!-- Letter T at bottom -->
  <text x="48" y="82" font-family="'Fredoka', sans-serif" font-weight="700" font-size="18" fill="#1E1B4B" text-anchor="middle" opacity="0.7">T</text>
</svg>
