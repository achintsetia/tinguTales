<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="lp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="rp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="100%" stop-color="#FF9F1C"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="92" height="92" rx="22" fill="url(#bgGrad)" stroke="#E9D5FF" stroke-width="1.5"/>

  <!-- Open Book, centred -->
  <g transform="translate(14, 22)">
    <!-- Left page fill -->
    <path d="M34 56 C34 20, 32 12, 4 4 L4 48 Z" fill="url(#lp)" opacity="0.2"/>
    <!-- Left page edge -->
    <path d="M34 56 C34 20, 32 12, 4 4" stroke="url(#lp)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Left page lines -->
    <line x1="12" y1="18" x2="30" y2="24" stroke="#3730A3" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="9" y1="28" x2="30" y2="33" stroke="#3730A3" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="7" y1="38" x2="30" y2="42" stroke="#3730A3" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

    <!-- Right page fill -->
    <path d="M34 56 C34 20, 32 12, 64 4 L64 48 Z" fill="url(#rp)" opacity="0.2"/>
    <!-- Right page edge -->
    <path d="M34 56 C34 20, 32 12, 64 4" stroke="url(#rp)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Right page lines -->
    <line x1="38" y1="24" x2="56" y2="18" stroke="#FF9F1C" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="38" y1="33" x2="59" y2="28" stroke="#FF9F1C" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="38" y1="42" x2="61" y2="38" stroke="#FF9F1C" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

    <!-- Spine -->
    <line x1="34" y1="7" x2="34" y2="56" stroke="#1E1B4B" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Bottom page curl -->
    <path d="M4 48 Q34 64 64 48" stroke="#1E1B4B" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.15"/>

    <!-- Stars above book -->
    <!-- Orange star -->
    <g transform="translate(15, -14)" filter="url(#glow)">
      <path d="M7 0 L8.5 4.8 L13.5 4.8 L9.5 7.8 L11 12.5 L7 9.5 L3 12.5 L4.5 7.8 L0.5 4.8 L5.5 4.8 Z" fill="#FF9F1C"/>
    </g>
    <!-- Teal star -->
    <g transform="translate(48, -10)" filter="url(#glow)">
      <path d="M5 0 L6.2 3.5 L9.9 3.5 L6.9 5.7 L8 9.2 L5 7 L2 9.2 L3.1 5.7 L0.1 3.5 L3.8 3.5 Z" fill="#2A9D8F"/>
    </g>
    <!-- Indigo star -->
    <g transform="translate(33, -18)" filter="url(#glow)">
      <path d="M3.5 0 L4.3 2.4 L6.8 2.4 L4.9 3.9 L5.6 6.3 L3.5 4.8 L1.4 6.3 L2.1 3.9 L0.2 2.4 L2.7 2.4 Z" fill="#4F46E5"/>
    </g>

    <!-- Sparkle dots -->
    <circle cx="5" cy="1" r="1.8" fill="#FF9F1C" opacity="0.75"/>
    <circle cx="63" cy="2" r="1.3" fill="#2A9D8F" opacity="0.65"/>
    <!-- 4-point sparkles -->
    <path d="M60 -4 L61 -2 L63 -1 L61 0 L60 2 L59 0 L57 -1 L59 -2 Z" fill="#FF9F1C" opacity="0.8"/>
    <path d="M5 10 L6 12 L8 13 L6 14 L5 16 L4 14 L2 13 L4 12 Z" fill="#2A9D8F" opacity="0.6"/>
  </g>
</svg>
